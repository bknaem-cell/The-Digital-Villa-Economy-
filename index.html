<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Naeem Ibrahim - Digital Villa</title>
    <style>
        /* বেসিক স্টাইল */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* স্ক্রল বন্ধ */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* সেন্ট্রাল প্রোফাইল এরিয়া */
        .profile-hub {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .profile-name {
            font-size: 20px;
            letter-spacing: 2px;
            color: #00e5ff;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
            margin-bottom: 5px;
        }

        .status-badge {
            font-size: 10px;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        /* বাটন গ্রিড সিস্টেম - ছোট সাইজ */
        .button-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 40px;
            width: 90%;
            max-width: 400px;
        }

        .nav-btn {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 8px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .nav-btn:active {
            transform: scale(0.9);
            border-color: #00e5ff;
            background: rgba(0, 229, 255, 0.1);
        }

        .btn-icon {
            font-size: 18px;
            margin-bottom: 5px;
            display: block;
        }

        .btn-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #aaa;
        }

        /* ক্যাটাগরি ভিত্তিক আলাদা ডিজাইন (ছোট বাটন) */
        .work-btn { border-bottom: 2px solid #00e5ff; } /* কাজের জন্য নীল */
        .personal-btn { border-bottom: 2px solid #ff0077; } /* ব্যক্তিগত কেনাকাটার জন্য গোলাপি */
        .agri-btn { border-bottom: 2px solid #00ff88; } /* কৃষির জন্য সবুজ */

        /* ফুলস্ক্রিন প্রম্পট টেক্সট */
        .fullscreen-hint {
            position: fixed;
            bottom: 20px;
            font-size: 10px;
            color: #444;
        }
    </style>
</head>
<body onclick="toggleFullScreen()">

    <div class="profile-hub">
        <div class="profile-name">NAEEM IBRAHIM</div>
        <div class="status-badge">System Active : Protected</div>
        <div style="font-size: 10px; color: #555; margin-top: 10px;">১০ কিলো স্কয়ার ইকোনমি</div>
    </div>

    <div class="button-container">
        <div class="nav-btn work-btn">
            <span class="btn-icon">🏗️</span>
            <span class="btn-label">CONSTRUCTION</span>
        </div>
        <div class="nav-btn work-btn">
            <span class="btn-icon">🎯</span>
            <span class="btn-label">MISSION 1</span>
        </div>
        <div class="nav-btn work-btn">
            <span class="btn-icon">🛡️</span>
            <span class="btn-label">SECURITY</span>
        </div>

        <div class="nav-btn personal-btn">
            <span class="btn-icon">👕</span>
            <span class="btn-label">APPAREL</span>
        </div>
        <div class="nav-btn personal-btn">
            <span class="btn-icon">👞</span>
            <span class="btn-label">FOOTWEAR</span>
        </div>
        <div class="nav-btn personal-btn">
            <span class="btn-icon">🛒</span>
            <span class="btn-label">MARKET</span>
        </div>

        <div class="nav-btn agri-btn">
            <span class="btn-icon">🌱</span>
            <span class="btn-label">AGRICULTURE</span>
        </div>
        <div class="nav-btn agri-btn">
            <span class="btn-icon">🪙</span>
            <span class="btn-label">TOKEN HUB</span>
        </div>
        <div class="nav-btn agri-btn">
            <span class="btn-icon">🌐</span>
            <span class="btn-label">GLOBAL MAP</span>
        </div>
    </div>

    <div class="fullscreen-hint">Tap anywhere for Full-Screen Mode</div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {
                    console.log(`Error attempting to enable full-screen mode: ${e.message}`);
                });
            }
        }
    </script>
</body>
</html>
