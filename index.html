<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAYEM 918 - THE FUTURE SYSTEM</title>
    <style>
        /* পুরো স্ক্রিনকে ল্যান্ডস্কেপ এবং ছবির মতো করা */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #010808;
            display: flex; justify-content: center; align-items: center;
        }

        /* আপনার সেই দামী ছবির হুবহু ব্যাকগ্রাউন্ড */
        .loading-wrapper {
            width: 100vw; height: 100vh;
            /* আপনার আপলোড করা ইমেজ ফাইলটি সরাসরি ব্যবহার করা হয়েছে */
            background: url('https://raw.githubusercontent.com/bknaem-cell/The-Digital-Villa-Economy-/main/5962.png') no-repeat center center;
            background-size: 100% 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative;
        }

        /* LOADING... লেখা যা জ্বলজ্বল করবে */
        .loading-text {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 6vw; color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 2%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.2; } }

        /* ড্রোনের ভেতরকার প্রোগ্রেস বার */
        .progress-box {
            width: 50%; height: 45px;
            border-radius: 25px;
            border: 2px solid #00ffcc;
            background: rgba(0, 0, 0, 0.7);
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
        }

        .fill-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, transparent, #00ffcc);
            box-shadow: 0 0 20px #00ffcc;
            animation: load 6s forwards linear;
        }

        @keyframes load { to { width: 100%; } }

        /* আপনার ID: 918 এবং সিরিয়াল নাম্বার */
        .id-panel {
            position: absolute; bottom: 8%;
            color: #00ffcc; font-family: sans-serif;
            font-size: 2vw; text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body onclick="startSystem()">

    <div class="loading-wrapper">
        <div class="loading-text">LOADING...</div>
        <div class="progress-box">
            <div class="fill-bar"></div>
        </div>
        <div class="id-panel">
            GLOBAL ID: 918 <br>
            USER: 000,000,001 / 10,000,000,000
        </div>
    </div>

    <audio id="startAudio" src="https://www.soundjay.com/mechanical/sounds/power-up-1.mp3"></audio>

    <script>
        function startSystem() {
            // টাচ করার সাথে সাথে সাউন্ড শুরু হবে
            var audio = document.getElementById('startAudio');
            audio.play();

            // ৫ সেকেন্ড পর অটোমেটিক লোডিং শেষ হবে
            setTimeout(function() {
                alert("স্বাগতম নাঈম ইব্রাহিম! আপনার ১০০০ কোটি বছরের ভবিষ্যৎ সিস্টেম প্রস্তুত।");
            }, 6000);
        }
    </script>
</body>
</html>
