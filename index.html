<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="id-screen" class="glass-card">
        <h2>ID Verification</h2>
        <div class="scanner-line"></div>
        <p>আইডি চেকআপ করা হচ্ছে...</p>
        <button onclick="startSystem()">ভেরিফাই করুন</button>
    </div>

    <div id="map-container" class="hidden">
        <div class="map-overlay">
            <h1>পুরো পৃথিবী এখন আপনার হাতের মুঠোয়</h1>
            <div class="map-placeholder">
                <div class="pulse-point" style="top: 40%; left: 30%;"></div>
                <div class="pulse-point" style="top: 60%; left: 70%;"></div>
                <div class="connection-line"></div>
            </div>
            <p class="status-text">সব প্রান্তে যাতায়াত পথ সচল রয়েছে...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
