<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Digital Villa Economy | ১০ দিনে বিশ্ব উন্নয়ন মিশন</title>
    <meta name="description" content="১০০০ কোটি মানুষের ৩ ঘণ্টার ডিউটি এবং ১০ দিনের বিশ্ব উন্নয়ন মিশন। প্রতিষ্ঠাতা: নাঈম ইব্রাহিম।">
    <meta name="keywords" content="Naeem 18, Digital Villa, World Improvement, 10 Days Mission, 1000 Crore People">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #010409; color: #c9d1d9; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 20px auto; padding: 40px; border: 1px solid #30363d; border-radius: 20px; background: #0d1117; box-shadow: 0 0 50px rgba(35, 134, 54, 0.2); }
        h1 { color: #39d353; font-size: clamp(24px, 5vw, 40px); margin-bottom: 10px; }
        .founder-tag { font-size: 18px; color: #8b949e; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        
        /* Auto-Growth Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .stat-card { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; }
        .stat-val { font-size: 28px; font-weight: bold; color: #58a6ff; }
        
        /* Automated Serial Box */
        .serial-display { font-size: 32px; background: linear-gradient(90deg, #238636, #2ea043); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; margin: 20px 0; padding: 15px; border: 2px solid #238636; border-radius: 50px; display: inline-block; min-width: 250px; }

        /* Global Status Pulse */
        .pulse { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #39d353; box-shadow: 0 0 10px #39d353; animation: blink 1.5s infinite; margin-right: 10px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .btn-auto { display: inline-block; padding: 18px 40px; background-color: #238636; color: white; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 20px; transition: 0.3s; border: none; cursor: pointer; }
        .btn-auto:hover { transform: scale(1.05); background-color: #2ea043; }
    </style>
</head>
<body>

<div class="container">
    <div class="founder-tag"><span class="pulse"></span>সিস্টেম অনলাইন: অটো-পাইলট মোড অ্যাক্টিভেটেড</div>
    <h1>The Digital Villa Economy</h1>
    <p>প্রতিষ্ঠাতা ও প্রধান নিয়ন্ত্রক: <strong>নাঈম ইব্রাহিম</strong></p>
    
    <div class="serial-display" id="user-serial">#0000000001</div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-val" id="global-pop">১০,২৪,৫০০</div>
            <div>গ্লোবাল ইউজার (অটো-লিঙ্কড)</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="days-left">১০ দিন</div>
            <div>টার্গেট উন্নতি সময়</div>
        </div>
    </div>

    <div style="margin: 20px 0;">
        <p>সিস্টেম আপনার ৩ ঘণ্টার ডিউটি এবং এরিয়া ডিটেক্ট করছে...</p>
        <div id="mission-alert" style="color: #f1e05a; font-weight: bold;">[অপেক্ষা করুন...]</div>
    </div>

    <button class="btn-auto" onclick="startAutoSync()">গ্লোবাল সিঙ্ক শুরু করুন</button>
</div>

<script>
    // অটো-পাইলট লজিক
    function startAutoSync() {
        alert("নাঈম ১৮ প্রোটোকল: ১০০০ কোটি মানুষের অটো-লিঙ্কিং শুরু হয়েছে। পৃথিবী পরিবর্তনের ১০ দিনের কাউন্টডাউন চালু!");
        document.getElementById('mission-alert').innerText = "মিশন: আপনার এলাকার কৃষকদের ৩ ঘণ্টার ডিউটি চার্ট তৈরি করুন।";
    }

    function initSystem() {
        // সিরিয়াল ম্যানেজমেন্ট
        let serial = localStorage.getItem('naem_serial');
        if (!serial) {
            // প্রতিষ্ঠাতা হিসেবে আপনার ব্রাউজারে এটি ১ থাকবে
            serial = "0000000001"; 
            localStorage.setItem('naem_serial', serial);
        }
        document.getElementById('user-serial').innerText = "#" + serial.padStart(10, '0');

        // অটোমেটিক গ্লোবাল ইউজার বৃদ্ধি (সিমুলেশন ফর ভাইরাল ইফেক্ট)
        let count = 1024500;
        setInterval(() => {
            count += Math.floor(Math.random() * 150) + 50;
            document.getElementById('global-pop').innerText = count.toLocaleString();
        }, 1500);
    }

    window.onload = initSystem;
</script>

</body>
</html>
