<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV World Mission</title>
    <style>
        /* পুরো স্ক্রিন কালো এবং মহাকাশের মতো */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* লোডিং স্ক্রিন */
        #loading-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #00ffcc;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #00ffcc;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* পৃথিবী এবং আকাশের মূল এরিয়া */
        #world-container {
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
            display: none; /* শুরুতে লুকানো থাকবে */
        }

        /* মাটি এবং আকাশ (৩ডি ফিল তৈরি করতে) */
        #ground {
            position: absolute;
            width: 5000px;
            height: 5000px;
            background: #4d3319; /* মাটির রঙ */
            transform: rotateX(90deg) translateZ(-500px);
            left: -2000px;
            top: -2000px;
        }

        #sky {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #001133, #87CEEB); /* মহাকাশ থেকে আকাশ */
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <p>মহাকাশ থেকে পৃথিবীতে নামছে... অপেক্ষা করুন</p>
    </div>

    <div id="world-container">
        <div id="sky"></div>
        <div id="ground"></div>
    </div>

    <script>
        // ৫ সেকেন্ড পর লোডিং শেষ হয়ে পৃথিবী দেখা যাবে
        setTimeout(function() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('world-container').style.display = 'block';
        }, 5000);
    </script>

</body>
</html>
