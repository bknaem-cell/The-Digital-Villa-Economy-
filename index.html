<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAIM - Shanti System</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #001529 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            width: 85%;
            max-width: 400px;
        }

        .sub-name {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffffff;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .brand-name {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.5));
            margin: 0;
            line-height: 1;
        }

        .slogan {
            font-size: 1.1rem;
            margin-top: 15px;
            color: #ccc;
            letter-spacing: 1px;
            font-weight: 300;
        }

        .progress-box {
            margin-top: 50px;
            width: 100%;
        }

        .loading-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 20px #00f2fe;
            border-radius: 100px;
            animation: moveLoad 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .status-text {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #00f2fe;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes moveLoad {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="sub-name">MY Sweet</div>
        <h1 class="brand-name">NAIM</h1>
        <p class="slogan">শান্তি সিস্টেম - ১০০০ কোটি মানুষের সমাধান</p>
        
        <div class="progress-box">
            <div class="loading-container">
                <div class="loading-bar"></div>
            </div>
            <div class="status-text">লোডিং হচ্ছে... একটি নতুন পৃথিবী...</div>
        </div>
    </div>

</body>
</html>
