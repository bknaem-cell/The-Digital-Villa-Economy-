<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV Control Panel</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-green: #39ff14;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #050a10;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* সিকিউরিটি স্ক্রিন */
        #login-screen {
            text-align: center;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        input {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-top: 15px;
        }

        /* কন্ট্রোল প্যানেল (শুরুতে লুকানো থাকবে) */
        #dashboard {
            display: none;
            width: 90%;
            max-width: 400px;
        }

        .id-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1.5px solid rgba(0, 242, 255, 0.5);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .id-card h2 {
            color: var(--neon-cyan);
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 18px;
        }

        .avatar-box {
            width: 120px;
            height: 120px;
            margin: 15px auto;
            border: 2px solid var(--neon-green);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(57, 255, 20, 0.05);
            box-shadow: inset 0 0 15px var(--neon-green);
        }

        .status-light {
            width: 10px;
            height: 10px;
            background: var(--neon-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--neon-green);
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h3>অ্যাক্সেস কোড দিন</h3>
        <input type="password" id="access-code" placeholder="কোড লিখুন...">
        <br><br>
        <button onclick="checkCode()" style="background: var(--neon-cyan); border:none; padding:10px 20px; cursor:pointer; border-radius:5px;">প্রবেশ করুন</button>
    </div>

    <div id="dashboard">
        <div class="id-card">
            <div style="text-align: right;"><span class="status-light"></span> Active</div>
            <h2>Global Biometric ID</h2>
            <div class="avatar-box">
                <span style="font-size: 50px;">👤</span>
            </div>
            <h1 style="font-size: 22px; margin: 10px 0;">Naim Ibrahim</h1>
            <p style="color: var(--neon-green); font-size: 14px;">Authorized User</p>
            <hr style="border: 0.5px solid var(--neon-cyan); opacity: 0.3;">
            <p style="font-size: 12px; opacity: 0.7;">Digital Villa Economy Project</p>
        </div>
    </div>

    <script>
        function checkCode() {
            const code = document.getElementById('access-code').value;
            // আপনার দেওয়া সিক্রেট কোড চেক করা হচ্ছে
            if (code === "নাঈম ১৮" || code === "918") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert("ভুল কোড! আবার চেষ্টা করুন।");
            }
        }
    </script>
</body>
</html>
