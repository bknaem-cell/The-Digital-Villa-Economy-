<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV Global Map Grid</title>
    <style>
        /* আপনার প্রিয় নিয়ন গ্রিন এবং সায়ান ডিজাইন */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        .map-container {
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 600px;
            max-height: 600px;
            border: 2px solid #00ffcc;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .tile {
            border: 1px solid rgba(57, 255, 20, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .tile-number {
            color: #39FF14;
            font-size: 8px;
            opacity: 0.6;
        }

        /* মাঝখানের ফাঁকা জায়গা ও মানুষের প্রতীক */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(5, 5, 5, 0.9);
            border: 3px solid #00ffcc;
            border-radius: 50%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px #00ffcc;
        }

        .human-symbol {
            font-size: 40px;
            color: #ffffff;
            text-shadow: 0 0 10px #00ffcc;
        }

        /* রাস্তার মতো সোজা লাইন ইফেক্ট */
        .road-line-v {
            position: absolute;
            width: 2px;
            height: 100%;
            background: rgba(0, 255, 204, 0.4);
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }
        
        .road-line-h {
            position: absolute;
            height: 2px;
            width: 100%;
            background: rgba(0, 255, 204, 0.4);
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="map-container" id="grid">
        <div class="center-circle">
            <div class="human-symbol">👤</div>
        </div>
        
        <div class="road-line-v"></div>
        <div class="road-line-h"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        // ১০০টি স্কয়ার তৈরি করার লজিক
        for (let i = 1; i <= 100; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            const number = document.createElement('span');
            number.className = 'tile-number';
            number.innerText = i;
            
            tile.appendChild(number);
            grid.appendChild(tile);
        }
    </script>
</body>
</html>
