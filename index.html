<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>ডিজিটাল ভিলা ইকোনমি - মাস্টার কন্ট্রোল</title>
    <style>
        body { background-color: #010816; color: white; font-family: sans-serif; margin: 0; padding: 10px; box-sizing: border-box; }
        .grid-container { display: grid; grid-template-columns: 320px 1fr 320px; gap: 10px; height: 95vh; }
        .panel { background: rgba(0, 20, 40, 0.6); border: 1.5px solid #00d2ff; border-radius: 10px; padding: 10px; position: relative; box-shadow: 0 0 15px rgba(0,210,255,0.2); }
        
        /* গ্লোবাল আইডি কার্ড সেকশন */
        .id-card { border: 2px solid #FFD700; border-radius: 15px; padding: 15px; background: rgba(0,0,0,0.4); text-align: center; }
        .id-photo { width: 100px; height: 120px; border: 2px solid #fff; margin: 0 auto 10px; border-radius: 5px; background: #222; font-size: 3rem; }

        /* মাঝখানের গোল ম্যাপ */
        .central-hub { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .circular-map { width: 380px; height: 380px; border-radius: 50%; border: 10px solid #39FF14; box-shadow: 0 0 40px #39FF14; position: relative; animation: rotateMap 60s linear infinite; }
        .map-label { background: #00d2ff; color: black; padding: 5px 20px; border-radius: 20px; font-weight: bold; position: absolute; top: 10px; }

        /* বাটন স্টাইল */
        .btn-action { width: 100%; padding: 10px; margin: 5px 0; background: rgba(0,210,255,0.1); border: 1px solid #00d2ff; color: #00d2ff; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-action:hover { background: #00d2ff; color: black; box-shadow: 0 0 15px #fff; }

        @keyframes rotateMap { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #00d2ff; text-shadow: 0 0 10px #00d2ff;">ডিজিটাল ভিলা ইকোনমি</h2>
    <div class="grid-container">
        
        <div class="panel">
            <div class="id-card">
                <div class="id-photo">👤</div>
                <div style="font-size: 1.2rem; color: #FFD700; font-weight: bold;">Naeem Ibrahim</div>
                <div style="font-size: 0.8rem; color: #ccc;">ID: 2190-781A-2022</div>
                <p style="color: #39FF14; font-size: 0.9rem;">বায়োমেট্রিক নিরাপত্তা সক্রিয়</p>
            </div>
            <div style="margin-top: 20px; border-top: 1px solid #444; padding-top: 10px;">
                <div style="color: #00d2ff;">আর্টুন কন্ট্রোল</div>
                <div style="height: 100px; background: rgba(255,255,255,0.05); margin-top: 5px;"></div>
            </div>
        </div>

        <div class="panel central-hub">
            <div class="map-label">১০ কিলো স্কয়ার</div>
            <div class="circular-map">
                <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-360deg); color: #39FF14; font-weight: bold;">LIVE SYSTEM</div>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn-action" style="width: 100px;">১০ কিবার</button>
                <button class="btn-action" style="width: 100px;">১০ কিলো</button>
            </div>
        </div>

        <div class="panel">
            <div style="border-bottom: 1px solid #444; padding-bottom: 10px;">
                <div style="color: #00d2ff;">ভার্চুয়াল টোকেন এক্সচেঞ্জ</div>
                <div style="font-size: 0.8rem; color: #39FF14;">8.0.00098 ➔ USD</div>
            </div>
            <div style="margin-top: 15px;">
                <div style="font-size: 0.9rem; margin-bottom: 10px;">দক্ষতাভিত্তিক কর্মসংস্থান পোর্টাল</div>
                <button class="btn-action">পণ্য ব্যবস্থাপনা</button>
                <button class="btn-action">হিমাগার পর্যবেক্ষণ</button>
                <button class="btn-action">নিরাপত্তা কন্ট্রোল</button>
            </div>
            <div style="margin-top: 20px; font-size: 0.8rem;">
                <div>কৃষি: 100 krm</div>
                <div>পরিবেশ: 50%</div>
            </div>
        </div>
    </div>
</body>
</html>
