<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV Project Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* লোডিং স্ক্রিন */
        #loading-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease-out;
        }

        /* প্রোফাইল প্যানেল */
        .profile-panel {
            width: 80px;
            height: 80px;
            background: cyan;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #fff;
            box-shadow: 0 0 15px cyan;
        }

        /* লোডিং বক্স */
        .loading-box {
            width: 250px;
            height: 20px;
            border: 2px solid cyan;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: cyan;
            box-shadow: 0 0 10px cyan;
            animation: loadProgress 3s linear forwards;
        }

        @keyframes loadProgress {
            to { width: 100%; }
        }

        /* মূল দৃশ্য (ম্যাপ ও আকাশ) */
        #main-content {
            display: none;
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, #001d3d, #003566);
            position: relative;
        }

        /* সূর্য ও চাঁদ */
        .sun {
            width: 80px;
            height: 80px;
            background: yellow;
            border-radius: 50%;
            position: absolute;
            top: 50px;
            left: 50px;
            box-shadow: 0 0 50px yellow;
        }

        .moon {
            width: 60px;
            height: 60px;
            background: #ddd;
            border-radius: 50%;
            position: absolute;
            top: 60px;
            right: 50px;
            box-shadow: 0 0 30px white;
        }

        /* মাটি */
        .ground {
            width: 100%;
            height: 150px;
            background: #3d2b1f;
            position: absolute;
            bottom: 0;
            border-top: 5px solid #228b22;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="profile-panel"></div>
        <div class="loading-box">
            <div class="loading-bar"></div>
        </div>
        <p style="color: cyan; margin-top: 10px;">প্রবেশ করা হচ্ছে...</p>
    </div>

    <div id="main-content">
        <div class="sun"></div>
        <div class="moon"></div>
        <div class="ground"></div>
        <h1 style="color: white; text-align: center; margin-top: 200px;">আমাদের ম্যাপ</h1>
    </div>

    <script>
        // ৩ সেকেন্ড পর লোডিং বন্ধ করে ম্যাপ দেখানোর স্ক্রিপ্ট
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }, 1000);
        }, 3000);
    </script>

</body>
</html>
