<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDV Global Economy - Job Specialized Map</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: #39FF14;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* অটো রোটেশন কন্টেইনার */
        #map-wrapper {
            transition: transform 0.2s ease-out;
            display: flex; justify-content: center; align-items: center;
        }

        .map-container {
            position: relative;
            width: 90vw; height: 90vw; max-width: 500px; max-height: 500px;
            display: grid; grid-template-columns: repeat(10, 1fr);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
        }

        .tile {
            border: 1px solid rgba(0, 255, 204, 0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
        }

        .tile:hover { background: rgba(57, 255, 20, 0.15); }

        /* পেশা ভিত্তিক আইকন ও নম্বর */
        .job-icon { font-size: 14px; margin-bottom: 2px; }
        .tile-number { font-size: 8px; opacity: 0.7; }

        /* মাঝখানের কেন্দ্রবিন্দু */
        .center-circle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: #050505; border: 3px solid #00ffcc;
            border-radius: 50%; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px #00ffcc;
        }
    </style>
</head>
<body>

    <div id="status">দিক: স্থির (পশ্চিম ফোকাস)</div>

    <div id="map-wrapper">
        <div class="map-container" id="grid">
            <div class="center-circle">👤</div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const jobs = ['🌾', '🛠️', '👕', '🚚', '🩺', '⚡']; // কৃষক, টেকনিশিয়ান, দর্জি, ড্রাইভার, ডাক্তার, ইঞ্জিনিয়ার

        for (let i = 1; i <= 100; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            // দৈবচয়নভাবে পেশা বণ্টন (যাতে বোঝা যায় একেক জন একেক কাজ করছে)
            const randomJob = jobs[Math.floor(Math.random() * jobs.length)];
            
            tile.innerHTML = `
                <span class="job-icon">${randomJob}</span>
                <span class="tile-number">${i}</span>
            `;
            grid.appendChild(tile);
        }

        // সেন্সর ভিত্তিক অটো-রোটেশন লজিক
        window.addEventListener('deviceorientation', function(event) {
            const heading = event.alpha; // ফোনের দিক (০-৩৬০ ডিগ্রি)
            const wrapper = document.getElementById('map-wrapper');
            if (heading !== null) {
                // ম্যাপটিকে সবসময় উত্তর/পশ্চিম অনুযায়ী স্থির রাখার জন্য রোটেশন
                wrapper.style.transform = `rotate(${-heading}deg)`;
                document.getElementById('status').innerText = `ম্যাপ অটো-রুটেট হচ্ছে: ${Math.round(heading)}°`;
            }
        });
    </script>
</body>
</html>
