<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, landscape=yes">
    <title>GLOBAL 1000 CR SYSTEM - LOADING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #010808;
            display: flex; justify-content: center; align-items: center;
        }

        /* আপনার প্রিয় ছবিটিকে ব্যাকগ্রাউন্ডে রাখা */
        .loading-container {
            width: 100vw; height: 100vh;
            background: url('https://i.ibb.co/image_2.png') no-repeat center center;
            background-size: cover;
            position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* LOADING... লেখা যা জ্বলজ্বল করবে */
        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 6vw; color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 30px;
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        /* ড্রোনের ভেতরকার প্রোগ্রেস বার */
        .progress-box {
            width: 50%; height: 50px;
            border-radius: 25px; border: 2px solid #00ffcc;
            background: rgba(0, 0, 0, 0.5);
            overflow: hidden; box-shadow: 0 0 15px #00ffcc;
        }

        .progress-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #004d4d, #00ffcc);
            box-shadow: 0 0 25px #00ffcc;
            animation: loadProgress 5s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes loadProgress {
            to { width: 100%; }
        }

        /* নিচের ID প্যানেল */
        .bottom-info {
            position: absolute; bottom: 8%;
            color: #00ffcc; font-family: sans-serif;
            font-size: 1.8vw; text-align: center;
            letter-spacing: 2px; text-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body onclick="initiateSystem()">

    <div class="loading-container">
        <div class="loading-text">LOADING...</div>
        <div class="progress-box">
            <div class="progress-fill"></div>
        </div>
        <div class="bottom-info">
            GLOBAL ID: 918 <br>
            USER: 000,000,001 / 10,000,000,000
        </div>
    </div>

    <audio id="startAudio" src="https://www.soundjay.com/mechanical/sounds/power-up-1.mp3"></audio>

    <script>
        function initiateSystem() {
            // সাউন্ড প্লে করা
            var audio = document.getElementById('startAudio');
            audio.play();

            // ৫ সেকেন্ড পর অটোমেটিক অ্যালার্ট আসবে (পরে এখানে ড্যাশবোর্ড যোগ হবে)
            setTimeout(function() {
                alert("সিস্টেম সফলভাবে চালু হয়েছে, নাঈম ইব্রাহিম!");
            }, 5000);
        }
    </script>
</body>
</html>
