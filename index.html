<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>The Digital Villa Economy - Serial 01</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f8ff; }
        .container { margin-top: 50px; padding: 20px; border: 2px solid #007bff; display: inline-block; border-radius: 15px; background: white; }
        .serial-box { font-size: 30px; font-weight: bold; color: #d9534f; margin: 20px 0; }
        .btn { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .mission-text { color: #555; font-size: 18px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>The Digital Villa Economy</h1>
    <p class="mission-text">১০০০ কোটি মানুষের ১০ দিনের বিশ্ব উন্নয়ন মিশন</p>
    
    <div class="mission-text">আপনার ইউনিক গ্লোবাল সিরিয়াল নম্বর:</div>
    <div id="serial-number" class="serial-box">লোড হচ্ছে...</div>

    <p>আপনার সিরিয়ালটি <strong>Active</strong> করতে ১০ জনকে যুক্ত করুন।</p>
    
    <button class="btn" onclick="shareMission()">মিশনটি শেয়ার করুন (Invite 10)</button>
    <br><br>
    <div id="status-msg" style="color: blue;"></div>
</div>

<script>
    // সিরিয়াল জেনারেটর লজিক (The Viral Trigger)
    function generateSerial() {
        let lastSerial = localStorage.getItem('userSerial');
        
        if (!lastSerial) {
            // যদি নতুন ইউজার হয়, তবে একটি ডাইনামিক নম্বর জেনারেট হবে
            // প্রতিষ্ঠাতা নাঈম ইব্রাহিমের জন্য সিরিয়াল ০১ নির্দিষ্ট করা আছে
            let newSerial = Math.floor(Math.random() * 10000000000) + 2; 
            localStorage.setItem('userSerial', newSerial);
            document.getElementById('serial-number').innerText = "#" + newSerial.toString().padStart(10, '0');
        } else {
            document.getElementById('serial-number').innerText = "#" + lastSerial.toString().padStart(10, '0');
        }
    }

    function shareMission() {
        const serial = document.getElementById('serial-number').innerText;
        const shareText = `আমি The Digital Villa Economy-তে যোগ দিয়েছি! আমার সিরিয়াল ${serial}। ১০০০ কোটি মানুষের এই মিশনে আপনিও যোগ দিন: https://github.com/bknaem-cell/The-Digital-Villa-Economy-`;
        
        navigator.clipboard.writeText(shareText).then(() => {
            document.getElementById('status-msg').innerText = "লিঙ্ক কপি হয়েছে! এখন ১০ জনকে পাঠান।";
        });
    }

    // পেজ লোড হলে সিরিয়াল দেখাবে
    window.onload = generateSerial;
</script>

</body>
</html>
