<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Naeem Ibrahim - Project</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* প্রোফাইল সেকশন */
        .profile {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile h1 {
            color: #00e5ff;
            font-size: 22px;
            letter-spacing: 1px;
            margin: 5px 0;
        }
        .status {
            font-size: 12px;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 3px 12px;
            border-radius: 15px;
        }

        /* বাটন গ্রিড - ছোট ও সুন্দর */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 95%;
            max-width: 360px;
        }

        .btn {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px 5px;
            text-align: center;
            transition: 0.2s;
        }

        .btn:active {
            background: #222;
            border-color: #00e5ff;
            transform: scale(0.95);
        }

        .icon { font-size: 20px; display: block; margin-bottom: 5px; }
        .label { font-size: 9px; color: #ccc; text-transform: uppercase; }

        /* ক্যাটাগরি কালার */
        .work { border-bottom: 2px solid #00e5ff; }
        .shop { border-bottom: 2px solid #ff0077; }
        .agri { border-bottom: 2px solid #00ff88; }

        /* ফুলস্ক্রিন বাটন */
        #fs-btn {
            position: fixed;
            bottom: 20px;
            background: rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            border: 1px solid #00e5ff;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="profile">
        <h1>NAEEM IBRAHIM</h1>
        <span class="status">SYSTEM ACTIVE: PROTECTED</span>
        <p style="font-size: 10px; color: #666;">১০ কিলো স্কয়ার ইকোনমি</p>
    </div>

    <div class="grid">
        <div class="btn work"><span class="icon">🏗️</span><span class="label">Work</span></div>
        <div class="btn work"><span class="icon">🎯</span><span class="label">Mission</span></div>
        <div class="btn work"><span class="icon">🛡️</span><span class="label">Security</span></div>
        
        <div class="btn shop"><span class="icon">👕</span><span class="label">Apparel</span></div>
        <div class="btn shop"><span class="icon">👞</span><span class="label">Footwear</span></div>
        <div class="btn shop"><span class="icon">🛒</span><span class="label">Market</span></div>

        <div class="btn agri"><span class="icon">🌱</span><span class="label">Agri</span></div>
        <div class="btn agri"><span class="icon">🪙</span><span class="label">Tokens</span></div>
        <div class="btn agri"><span class="icon">🌐</span><span class="label">Map</span></div>
    </div>

    <button id="fs-btn" onclick="goFull()">Go Full Screen</button>

    <script>
        function goFull() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
            document.getElementById('fs-btn').style.display = 'none';
        }
    </script>
</body>
</html>
