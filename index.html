<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Panel - Mission 18</title>
    <style>
        /* হাই-টেক ডিজাইন স্টাইল */
        body {
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            border-bottom: 2px solid #00ffcc;
            padding-bottom: 10px;
            margin-bottom: 30px;
            box-shadow: 0 0 15px #00ffcc;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #00ffcc;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        h1 { font-size: 24px; text-transform: uppercase; }
        .status { color: #ffcc00; font-weight: bold; }
        .btn {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin-top: 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Digital Villa Economy</h1>
        <p>Master Control: নাঈম ইব্রাহিম</p>
    </div>

    <div class="card">
        <h3>মাস্টার কন্ট্রোল অ্যাক্টিভেটেড</h3>
        <p>সিস্টেম স্ট্যাটাস: <span class="status">অনলাইন (Live)</span></p>
        <p>সাথী সংখ্যা: ০২ (সজীব ও ওমান টিম)</p>
        <p>আপনার Nj Gold: ১০০.০০</p>
        <button class="btn" onclick="alert('সিস্টেম লোড হচ্ছে...')">কন্ট্রোল প্যানেল ওপেন করুন</button>
    </div>

    <p style="margin-top: 30px; font-size: 12px; color: #555;">© মিশন ১৮ - বৈশ্বিক ডিজিটাল সাম্রাজ্য</p>

</body>
</html>
