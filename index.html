<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Villa Loading Screen</title>
    <style>
        /* ব্যাকগ্রাউন্ড স্টাইল - ডার্ক গ্যালাক্সি আবহ */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #001a33 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        /* NAIM - বড় এবং গোল্ডেন ইফেক্ট */
        .title-main {
            font-size: 70px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 2px 2px 5px rgba(0,0,0,1);
            letter-spacing: 5px;
            margin-bottom: -10px;
            text-transform: uppercase;
        }

        /* MY Sweet - স্টাইলিশ ছোট লেখা */
        .title-sub {
            font-size: 28px;
            font-style: italic;
            font-family: 'Cursive', serif;
            color: #ffffff;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* শান্তি সিস্টেম লেখা */
        .description {
            font-size: 18px;
            color: #ffcc00;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* লোডিং বার কন্টেইনার */
        .loading-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 127, 0.3);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 127, 0.2);
        }

        /* এনিমেটেড গ্রিন লোডিং বার */
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff7f, #00ffcc);
            box-shadow: 0 0 20px #00ff7f;
            border-radius: 10px;
            animation: loadProgress 5s infinite ease-in-out;
        }

        /* লোডিং হচ্ছে টেক্সট */
        .loading-text {
            margin-top: 15px;
            font-size: 14px;
            color: #00ff7f;
            opacity: 0.8;
            font-style: italic;
        }

        /* এনিমেশন লজিক */
        @keyframes loadProgress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-main">NAIM</div>
        <div class="title-sub">MY Sweet</div>
        
        <div class="description">শান্তি সিস্টেম - ১০০০ কোটি মানুষের সমাধান</div>
        
        <div class="loading-bar-container">
            <div class="loading-bar-fill"></div>
        </div>
        
        <div class="loading-text">লোডিং হচ্ছে... একটি নতুন পৃথিবী...</div>
    </div>

</body>
</html>
