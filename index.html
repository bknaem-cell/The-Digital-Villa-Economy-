<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLOBAL 1000 CR SYSTEM - FULL SCREEN</title>
    <style>
        /* পুরো স্ক্রিনকে ছবির মতো ল্যান্ডস্কেপ করা */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #010808;
        }

        /* আপনার সেই দামী ছবির হুবহু ব্যাকগ্রাউন্ড */
        .full-display-wrapper {
            width: 100vw; height: 100vh;
            background: url('https://i.ibb.co/L5pYFhL/image-2.png') no-repeat center center;
            background-size: 100% 100%; /* এটি পুরো স্ক্রিন জুড়ে ছবিটিকে টেনে বসাবে */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative;
        }

        /* LOADING... লেখা যা ছবির মতো জায়গাতে থাকবে */
        .loading-text {
            font-family: sans-serif;
            font-weight: bold;
            font-size: 7vw; color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 2%;
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 50% { opacity: 0.2; } }

        /* ড্রোনের ভেতরকার এনিমেটেড প্রোগ্রেস বার */
        .progress-box {
            width: 50%; height: 8%;
            border-radius: 50px;
            border: 3px solid #00ffcc;
            background: rgba(0, 0, 0, 0.7);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
        }

        .fill-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, transparent, #00ffcc, #00ffff);
            box-shadow: 0 0 25px #00ffcc;
            animation: fillUp 6s forwards linear;
        }

        @keyframes fillUp { to { width: 100%; } }

        /* নিচে আপনার ID: 918 এবং সিরিয়াল নাম্বার */
        .nayem-footer {
            position: absolute; bottom: 8%;
            color: #00ffcc; font-family: sans-serif;
            font-size: 2.2vw; text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body onclick="startSound()">

    <div class="full-display-wrapper">
        <div class="loading-text">LOADING...</div>
        <div class="progress-box">
            <div class="fill-bar"></div>
        </div>
        <div class="nayem-footer">
            ID: 918 <br>
            000,000,001 / 10,000,000,000
        </div>
    </div>

    <audio id="engineSound" src="https://www.soundjay.com/mechanical/sounds/power-up-1.mp3"></audio>

    <script>
        function startSound() {
            document.getElementById('engineSound').play();
            // লোডিং শেষ হওয়ার পর স্বাগতম মেসেজ
            setTimeout(function() {
                alert("স্বাগতম নাঈম ইব্রাহিম! আপনার ১০০০ কোটি বছরের উন্নতির সিঁড়ি প্রস্তুত।");
            }, 6000);
        }
    </script>
</body>
</html>
