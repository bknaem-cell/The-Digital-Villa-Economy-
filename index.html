<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLOBAL 1000 CR SYSTEM - FIXED</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #010808;
        }

        /* আপনার সেই প্রিয় ছবিটিকে ব্যাকগ্রাউন্ডে রাখা */
        .loading-screen {
            width: 100vw; height: 100vh;
            background: url('https://raw.githubusercontent.com/bknaem-cell/The-Digital-Villa-Economy-/main/5962.png') no-repeat center center;
            background-size: 100% 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .loading-text {
            font-family: sans-serif; font-weight: bold;
            font-size: 6vw; color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 2%;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        .progress-box {
            width: 50%; height: 8%;
            border-radius: 50px; border: 3px solid #00ffcc;
            background: rgba(0, 0, 0, 0.7); overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
        }

        .fill-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, transparent, #00ffcc);
            animation: load 5s forwards linear;
        }

        @keyframes load { to { width: 100%; } }

        .footer-info {
            position: absolute; bottom: 8%;
            color: #00ffcc; font-size: 2vw; text-align: center;
            text-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body onclick="playStartSound()">

    <div class="loading-screen">
        <div class="loading-text">LOADING...</div>
        <div class="progress-box">
            <div class="fill-bar"></div>
        </div>
        <div class="footer-info">
            ID: 918 <br>
            000,000,001 / 10,000,000,000
        </div>
    </div>

    <audio id="startup" src="https://www.soundjay.com/mechanical/sounds/power-up-1.mp3"></audio>

    <script>
        function playStartSound() {
            document.getElementById('startup').play();
            setTimeout(function() {
                alert("স্বাগতম নাঈম ইব্রাহিম! সিস্টেম এখন প্রস্তুত।");
            }, 5500);
        }
    </script>
</body>
</html>
