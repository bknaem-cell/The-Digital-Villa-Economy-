<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Villa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #001220 0%, #000000 100%);
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* NAIM - হুবহু ছবির মতো বড় ও গ্লোয়িং সোনালী */
        .naim-text {
            font-size: 85px;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 
                         0 0 60px rgba(255, 215, 0, 0.4);
            letter-spacing: 8px;
            margin-bottom: 5px;
            line-height: 1;
        }

        /* MY Sweet - সাদা স্টাইলিশ লেখা */
        .sweet-text {
            font-size: 24px;
            font-family: 'Georgia', serif;
            font-style: italic;
            color: #ffffff;
            margin-bottom: 40px;
            font-weight: normal;
        }

        /* শান্তি সিস্টেম - হলুদ কালার */
        .info-text {
            font-size: 16px;
            color: #FFCC00;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* লোডিং বার - নিয়ন গ্রিন */
        .loader-container {
            width: 85%;
            max-width: 350px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .loader-fill {
            height: 100%;
            width: 0%;
            background: #00FFCC;
            box-shadow: 0 0 20px #00FFCC, 0 0 40px #00FFCC;
            border-radius: 20px;
            animation: moveProgress 4s infinite ease-in-out;
        }

        .bottom-text {
            margin-top: 15px;
            font-size: 13px;
            color: #00FFCC;
            font-family: 'Courier New', monospace;
        }

        @keyframes moveProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="naim-text">NAIM</div>
        <div class="sweet-text">MY Sweet</div>
        
        <div class="info-text">শান্তি সিস্টেম - ১০০০ কোটি মানুষের সমাধান</div>
        
        <div class="loader-container">
            <div class="loader-fill"></div>
        </div>
        
        <div class="bottom-text">লোডিং হচ্ছে... একটি নতুন পৃথিবী...</div>
    </div>

</body>
</html>
