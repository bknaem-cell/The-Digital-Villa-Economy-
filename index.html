<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Control Center - NAIM 18</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-overlay"></div>

    <div class="main-container">
        <header class="glass-panel header">
            <h1 class="neon-text-gold">GLOBAL CONTROL CENTER</h1>
            <p class="operator-info">অপারেটর: নাঈম ইব্রাহিম | আইডি: ৯১৮-ওমেগা</p>
        </header>

        <div class="stats-grid">
            <div class="glass-panel card neon-border-cyan">
                <h3>টার্গেট জনসংখ্যা</h3>
                <h2 class="glow-text">১০০০ কোটি</h2>
                <p class="status">সিস্টেম কানেক্টেড</p>
            </div>

            <div class="glass-panel card neon-border-green">
                <h3>অ্যাভেলেবল ব্যালেন্স</h3>
                <h2 class="glow-text">৳ ০.০০</h2>
                <p class="status">আপডেট: রিয়েল-টাইম</p>
            </div>
        </div>

        <div class="glass-panel mission">
            <h3 class="cyan-text">মিশন ভিশন</h3>
            <p>"পুরো পৃথিবীর সিস্টেম পরিবর্তন এবং ১০০০ কোটি মানুষের জীবনমান উন্নত করাই আমাদের মূল লক্ষ্য।"</p>
        </div>

        <div class="action-grid">
            <div class="glass-panel health-bar">
                <p>সিস্টেম হেলথ: ৯৮.৭%</p>
                <div class="progress-container">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <button class="kill-switch">
                EMERGENCY KILL SWITCH
            </button>
        </div>
    </div>

</body>
</html>
