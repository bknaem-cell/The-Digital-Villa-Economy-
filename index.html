<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAIM - Shanti System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* গভীর মহাকাশ ইফেক্ট */
            background: radial-gradient(circle at center, #001f3f 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
        }

        /* "MY Sweet" - হাতের লেখার মতো স্টাইল */
        .sub-name {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: -15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* "NAIM" - একদম ছবির মতো রাজকীয় সোনালী */
        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 4.5rem;
            font-weight: bold;
            background: linear-gradient(to bottom, #fff3b0 0%, #ffd700 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        /* স্লোগান */
        .slogan {
            font-size: 1.1rem;
            color: #ffffff;
            margin-top: 15px;
            letter-spacing: 1px;
            font-weight: 300;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        /* লোডিং বার - ছবির মতো নিয়ন সবুজ */
        .progress-box {
            margin-top: 50px;
            width: 80%;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        .loading-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 127, 0.4);
            overflow: hidden;
            position: relative;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ff87 0%, #60efff 100%);
            box-shadow: 0 0 20px #00ff87;
            border-radius: 20px;
            animation: load 6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .loading-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #00ff87;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sub-name">MY Sweet</div>
        <div class="brand-name">NAIM</div>
        <div class="slogan">শান্তি সিস্টেম - ১০০০ কোটি মানুষের সমাধান</div>
        
        <div class="progress-box">
            <div class="loading-container">
                <div class="loading-bar"></div>
            </div>
            <div class="loading-text">লোডিং হচ্ছে... একটি নতুন পৃথিবী...</div>
        </div>
    </div>

</body>
</html>
