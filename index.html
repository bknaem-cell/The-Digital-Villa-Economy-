<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAEEM 18 - MASTER CONTROL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        /* ১. লোডিং পেজ ও লোডিং বক্স */
        #loading-screen {
            position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-box {
            width: 200px; height: 4px; background: #1a1a1a; border-radius: 10px; margin-top: 20px; overflow: hidden;
        }
        .loader-fill {
            width: 0%; height: 100%; background: linear-gradient(90deg, #00d4ff, #0055ff);
            animation: loading 3s linear forwards;
        }
        @keyframes loading { to { width: 100%; } }

        /* ২. মেইন ইন্টারফেস (ল্যান্ডস্কেপ ফোকাস) */
        #main-system {
            display: none; width: 100vw; height: 100vh;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1000') no-repeat center;
            background-size: cover; position: relative;
        }
        .overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(2px); }

        /* ৩. ডানদিকের ছোট গোল চ্যাপ্টা বাটন */
        .button-container {
            position: absolute; right: 10px; top: 5%; height: 90%;
            display: flex; flex-direction: column; justify-content: space-around; align-items: flex-end;
            z-index: 100;
        }
        .orb-btn {
            width: 65px; height: 35px; border-radius: 50% / 25%;
            background: rgba(0, 212, 255, 0.1); border: 1.5px solid #00d4ff;
            color: #00d4ff; font-size: 9px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5); cursor: pointer;
            transition: 0.2s; text-transform: uppercase;
        }
        .orb-btn:active { transform: scale(0.9); background: #00d4ff; color: #000; }

        /* সেন্ট্রাল প্রোফাইল */
        .profile-hub {
            position: absolute; left: 5%; top: 50%; transform: translateY(-50%);
            border-left: 3px solid #00d4ff; padding-left: 20px;
        }
        .id-badge { font-size: 24px; color: #fff; letter-spacing: 2px; }
        .status-light { width: 10px; height: 10px; background: #238636; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #238636; }

    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="color: #fff; letter-spacing: 10px; font-size: 1.5rem;">NAEEM 18</h1>
        <div class="loader-box">
            <div class="loader-fill"></div>
        </div>
        <p style="color: #00d4ff; margin-top: 10px; font-size: 12px;">INITIALIZING SECURE LINK...</p>
    </div>

    <div id="main-system">
        <div class="overlay"></div>

        <div class="button-container">
            <div class="orb-btn">Agri</div>
            <div class="orb-btn">Build</div>
            <div class="orb-btn">Map</div>
            <div class="orb-btn">Token</div>
            <div class="orb-btn">3HR</div>
            <div class="orb-btn">Hub</div>
            <div class="orb-btn">Stock</div>
            <div class="orb-btn">Safety</div>
        </div>

        <div class="profile-hub">
            <div class="id-badge">নাঈম ইব্রাহিম</div>
            <p style="color: #00d4ff;">ID: 918 | <span class="status-light"></span> ACTIVE</p>
            <div style="margin-top: 20px; font-size: 30px;">💎 1,000</div>
            <p style="font-size: 10px; color: #8b949e;">গ্লোবাল ভিলা ইকোনমি</p>
        </div>
    </div>

    <script>
        // ৩ সেকেন্ডের লোডিং শেষে মেইন স্ক্রিন
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
        }, 3000);

        // অটো ল্যান্ডস্কেপ অ্যালার্ট (যদি ইউজার পোর্ট্রেট মোডে থাকে)
        window.addEventListener("orientationchange", function() {
            if(window.orientation == 0) {
                alert("সেরা অভিজ্ঞতার জন্য ফোনটি আড়াআড়ি (Landscape) ধরুন।");
            }
        });
    </script>
</body>
</html>
