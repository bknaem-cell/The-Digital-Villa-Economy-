<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নাঈম ১৮ - ডিজিটাল ভিলা ইকোনমি</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; text-align: center; padding: 20px; }
        .dashboard { border: 2px solid #58a6ff; border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; background: #161b22; box-shadow: 0 0 20px rgba(88, 166, 255, 0.2); }
        h1 { color: #58a6ff; font-size: 24px; }
        .info { text-align: left; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .token-box { background: #238636; color: white; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 20px; margin-top: 10px; }
        .package { color: #ffa657; font-weight: bold; margin-top: 15px; }
        .inventory { display: flex; justify-content: space-between; background: #21262d; padding: 10px; margin: 5px 0; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>নাঈম ১৮ - মাস্টার প্যানেল</h1>
        
        <div class="info">
            <p><strong>নাম:</strong> নাঈম ইব্রাহিম</p>
            <p><strong>কোড:</strong> ৯১৮ / নাঈম ১৮</p>
            <p><strong>অবস্থান:</strong> একদন্ত, পাবনা</p>
        </div>

        <div class="token-box">
            আপনার আজকের টোকেন: ১০০০ 💎
        </div>

        <div class="package">
            📦 ৭ দিনের বাজার প্যাকেজ আসতে দেরি: ২ দিন
        </div>

        <h3>🏠 ঘরের ইনভেন্টরি (হিসাব):</h3>
        <div class="inventory"><span>চাল:</span> <span>৫ কেজি</span></div>
        <div class="inventory"><span>তেল:</span> <span>২ লিটার</span></div>
        <div class="inventory"><span>স্যান্ডেল:</span> <span>১ জোড়া</span></div>
        <div class="inventory"><span>শার্ট:</span> <span>৩ টি</span></div>

        <p style="font-size: 12px; color: #8b949e; margin-top: 20px;">
            "৩ ঘণ্টা কাজ = নিশ্চিন্ত জীবন" - কোটি গুণ আধুনিক পৃথিবী।
        </p>
    </div>

</body>
</html>
