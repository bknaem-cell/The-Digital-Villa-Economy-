<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAIM's 10 Kilo Sq. System - Loading</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505; /* Deep black background */
            font-family: 'Courier New', Courier, monospace; /* High-tech font */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        #loading-container {
            width: 80%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00f0ff; /* Glowing cyan border */
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
            padding: 40px;
            border-radius: 15px;
            transform-style: preserve-3d;
            animation: containerGlow 4s infinite ease-in-out;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 240, 255, 0.8); }
        }

        #prism-logo {
            font-size: 3em;
            font-weight: bold;
            color: #FFD700; /* Golden color from NAIM My Sweet */
            text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700, 0 0 30px #FF4500;
            margin-bottom: 20px;
            animation: logoPulse 2s infinite alternate;
        }

        @keyframes logoPulse {
            from { transform: scale(1); text-shadow: 0 0 10px #FFD700; }
            to { transform: scale(1.05); text-shadow: 0 0 20px #FFD700, 0 0 40px #FF4500; }
        }

        #system-title {
            font-size: 1.5em;
            color: #00f0ff; /* Cyan */
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #system-subtitle {
            font-size: 1.2em;
            color: #999;
            margin-bottom: 30px;
        }

        #progress-bar-container {
            width: 100%;
            height: 20px;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #00f0ff;
            margin-bottom: 20px;
            box-shadow: inset 0 0 5px rgba(0, 240, 255, 0.5);
        }

        #progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ced1, #00f0ff); /* Teal to Cyan */
            border-radius: 10px;
            box-shadow: 0 0 10px #00f0ff;
            transition: width 0.1s linear;
        }

        #status-text {
            font-size: 1.1em;
            color: #fff;
            margin-bottom: 10px;
        }

        #data-stream {
            font-size: 0.9em;
            color: #66cdaa; /* Medium Aquamarine for details */
            height: 100px;
            overflow: hidden;
            text-align: left;
            width: 100%;
            background: rgba(0, 20, 20, 0.5);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .data-line {
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid;
            animation: typing 2s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00f0ff; }
        }

    </style>
</head>
<body>

    <div id="loading-container">
        <div id="prism-logo">NAIM</div>
        <div id="system-title">10 Kilo Sq. System</div>
        <div id="system-subtitle">শান্তি সিস্টেম - ১০০০ কোটি মানুষের সমাধান</div>

        <div id="progress-bar-container">
            <div id="progress-bar-fill"></div>
        </div>

        <div id="status-text">সিস্টেম লোড হচ্ছে...</div>
        <div id="data-stream">
            </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBarFill = document.getElementById('progress-bar-fill');
            const statusText = document.getElementById('status-text');
            const dataStream = document.getElementById('data-stream');

            const statusMessages = [
                "ইনিশিয়ালাইজিং কোর প্রোটোকল...",
                "স্যাটেলাইট লিংক স্থাপন করা হচ্ছে...",
                "পরিবেশগত ডেটা বিশ্লেষণ করা হচ্ছে...",
                "ড্রোন নেটওয়ার্ক সিঙ্ক্রোনাইজ করা হচ্ছে...",
                "জনসংখ্যা সহায়তা মডিউল সক্রিয় করা হচ্ছে...",
                "বৈশ্বিক সম্প্রীতি স্তর যাচাই করা হচ্ছে...",
                "শান্তি সিস্টেম সক্রিয় করার জন্য প্রস্তুত..."
            ];

            const dataLines = [
                "> CONFIG: NAYEM_ENV_PROT_V10.2",
                "> SATELLITE: SAT_LINK_ESTABLISHED",
                "> DRONES: 10,000/10,000 ACTIVE",
                "> POPULATION: 10,000,000,000 OK",
                "> HARMONY LEVEL: 98.7%",
                "> AREA CODE: 10KSQ_SYS_ALPHA",
                "> FUTURE_YEAR: 1000 READY"
            ];

            let progress = 0;
            let currentStatusIndex = 0;
            let currentDataLineIndex = 0;

            function updateProgress() {
                progress += Math.random() * 5; // Simulates varied loading speed
                if (progress > 100) progress = 100;

                progressBarFill.style.width = progress + '%';

                // Update status message based on progress thresholds
                if (progress > (currentStatusIndex + 1) * (100 / statusMessages.length) && currentStatusIndex < statusMessages.length) {
                    statusText.textContent = statusMessages[currentStatusIndex];
                    currentStatusIndex++;
                }

                // Add data lines over time
                if (progress > (currentDataLineIndex + 1) * (100 / dataLines.length) && currentDataLineIndex < dataLines.length) {
                    const newDataLine = document.createElement('div');
                    newDataLine.classList.add('data-line');
                    newDataLine.textContent = dataLines[currentDataLineIndex];
                    dataStream.appendChild(newDataLine);
                    dataStream.scrollTop = dataStream.scrollHeight; // Auto-scroll
                    currentDataLineIndex++;
                }

                if (progress < 100) {
                    requestAnimationFrame(updateProgress);
                } else {
                    statusText.textContent = "লোডিং সম্পন্ন। শান্তি সিস্টেম সক্রিয় হয়েছে।";
                    // You can add redirection logic here to the main system page
                    // setTimeout(() => { window.location.href = 'main_system.html'; }, 2000);
                }
            }

            requestAnimationFrame(updateProgress);
        });
    </script>

</body>
</html>
